# w10 manipulator VI integrator parameters
/**:  # 通配符，表示所有节点都能看到下面的参数
  ros__parameters:
    q_init: 0.2
    timestep: 0.01
    duration: 10.0
    urdf_path: "~/ros2_ws/dynamic_ws/src/w10_sim/urdf/w10.urdf"
    # If w10.urdf loading fails, will automatically fallback to 7_pendulum.urdf
    eps_diff: 1.0e-6

  ctsvi_w10_node:
    ros__parameters:
      # Simulation parameters
      timestep: 0.01          # simulation timestep [s]
      duration: 1.0            # total simulation duration [s]
      
      # URDF model path (support ~ for home directory)
      urdf_path: "~/ros2_ws/dynamic_ws/src/w10_sim/urdf/w10.urdf"
      
      # Initial joint configuration (scalar - will be applied to all joints)
      # For w10: 0.1 rad = ~5.7 degrees (safe starting pose)
      q_init: 0.1
